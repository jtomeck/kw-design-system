# config.yml

backend:
  name: git-gateway
  branch: master # Branch to update (optional; defaults to master)
media_folder: 'assets/uploads'
collections:
  - name: 'components'
    label: 'Components'
    folder: '_components/'
    fields:
      - { name: Title }
  - name: 'guidelines'
    label: 'Guidelines'
    folder: '_guidelines/'
    fields:
      - { name: Title }
